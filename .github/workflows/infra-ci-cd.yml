name: Infra - Terraform CI/CD

on:
  push:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      cloud:
        description: Cloud provider
        required: true
        default: aws
        type: choice
        options:
          - aws
          - azure
      env:
        description: Environment to apply (dev, shared, staging, all)
        required: true
        default: dev
        type: choice
        options:
          - dev
          - shared
          - staging
          - all

env:
  CLOUD: ${{ github.event.inputs.cloud }}                  
  BASE_PATH: terraform/${{ github.event.inputs.cloud }}/envs

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

  terraform_format:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.5
          terraform_wrapper: false
      - uses: actions/checkout@v4
      - name: Terraform fmt check
        shell: bash
        run: terraform fmt -check -recursive ${{ env.BASE_PATH }} || true 

  terraform_validate:
    runs-on: ubuntu-latest
    needs: terraform_format
    strategy:
      matrix:
        env_name: [shared, dev, staging]
    steps:
      - uses: actions/checkout@v4

      - name: Terraform validate ${{ matrix.env_name }}
        uses: cbnr-devops/GitHub-reusable-workflows/.github/actions/terraform-validate@v1
        with:
          working_dir: ${{ env.BASE_PATH }}/${{ matrix.env_name }}

  terraform_apply:
    runs-on: ubuntu-latest
    needs: terraform_validate
    strategy:
      matrix:
        env_name: [shared, dev, staging]

    if: >
      needs.terraform_validate.result == 'success' &&
      (${{ github.event.inputs.env }} == matrix.env_name || ${{ github.event.inputs.env }} == 'all')

    steps:
      - uses: actions/checkout@v4

      - name: Terraform apply ${{ matrix.env_name }}
        uses: cbnr-devops/GitHub-reusable-workflows/.github/actions/terraform-apply@v1
        with:
          working_dir: ${{ env.BASE_PATH }}/${{ matrix.env_name }}
